<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Cobranças · Rafix</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F4F6FA; --white:#FFFFFF; --border:#E3E8F0; --border2:#CBD3E0;
  --text:#0F1828; --text-muted:#64748B; --text-light:#94A3B8;
  --primary:#1A56DB; --primary-light:#EEF2FF; --primary-hover:#1648C0;
  --green:#057A55; --green-bg:#ECFDF5; --green-border:#A7F3D0;
  --yellow-bg:#FFFBEB; --yellow-border:#FCD34D;
  --red:#991B1B; --red-bg:#FEF2F2; --red-border:#FECACA;
  --gray-bg:#F3F4F6; --gray-border:#D1D5DB; --paid:#4B5563;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.04);
  --radius:8px; --font:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* FIXED TOP */
.fixed-top{flex-shrink:0;background:var(--bg);z-index:100}
.fixed-top>.header,.fixed-top>.tabs-bar{width:100%}

/* HEADER */
.header{background:#1A1F2E;border-bottom:1px solid #2A3045;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.header-left{display:flex;align-items:center;gap:12px}
.logo-wrap{width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,.05);border-radius:10px;padding:4px}
.logo-wrap img{width:32px;height:32px;object-fit:contain}
.header-title{font-size:15px;font-weight:700;color:#FFFFFF;letter-spacing:-0.3px}
.header-sub{font-size:11px;color:#8B93A8;margin-top:1px}
.header-right{display:flex;align-items:center;gap:10px}
.base-badge{display:flex;align-items:center;gap:6px;background:rgba(255,193,7,.12);border:1px solid rgba(255,193,7,.35);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;color:#FCD34D}
.import-btn{background:#2D5ECC;color:#fff;border:none;padding:0 16px;height:34px;border-radius:6px;font-weight:600;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;white-space:nowrap;font-family:var(--font)}
.import-btn:hover{background:#2451B5}
.clear-btn{background:none;border:1px solid rgba(255,255,255,.15);color:#8B93A8;border-radius:6px;padding:0 12px;height:34px;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;font-family:var(--font)}
.clear-btn:hover{background:rgba(248,113,113,.1)}
#fileInput{display:none}


/* TABS */
.tabs-bar{background:#252B3B;border-bottom:1px solid #2A3045;padding:0 24px;display:flex}
.tab-btn{padding:12px 20px;border:none;background:none;color:#8B93A8;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;display:flex;align-items:center;gap:6px;font-family:var(--font)}
.tab-btn:hover{color:#FFFFFF}
.tab-btn.active{color:#FFFFFF;border-bottom-color:#4D8EFF;font-weight:600}
.tab-badge{background:rgba(77,142,255,.2);color:#7DB3FF;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.tab-badge.red-badge{background:rgba(248,113,113,.2);color:#F87171}

/* CARDS */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:14px 24px 0;background:var(--bg)}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow-sm);display:flex;align-items:flex-start;gap:12px}
.card-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.card-icon.blue{background:var(--primary-light)}.card-icon.red{background:var(--red-bg)}.card-icon.yellow{background:var(--yellow-bg)}.card-icon.green{background:var(--green-bg)}.card-icon.gray{background:var(--gray-bg)}
.card-body{flex:1;min-width:0}
.card-label{font-size:11px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card-value{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.5px;line-height:1}
.card-value.c-red{color:#DC2626}.card-value.c-yellow{color:#B45309}.card-value.c-green{color:var(--green)}.card-value.c-gray{color:var(--paid)}
.card-sub{font-size:11px;color:var(--text-light);margin-top:3px}

/* TOOLBAR */
.toolbar{padding:10px 24px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--bg)}
.filter-group{display:flex;gap:3px;background:var(--white);border:1px solid var(--border);border-radius:6px;padding:3px}
.filter-btn{padding:5px 12px;border-radius:4px;border:none;background:transparent;color:var(--text-muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap;font-family:var(--font)}
.filter-btn:hover{background:var(--bg);color:var(--text)}
.filter-btn.active{background:var(--primary);color:#fff;font-weight:600}
.filter-btn.active.red-f{background:#DC2626}.filter-btn.active.yellow-f{background:#D97706}.filter-btn.active.green-f{background:#059669}.filter-btn.active.gray-f{background:#6B7280}
.toolbar-spacer{flex:1}
.search-wrap{position:relative}
.search-wrap input{background:var(--white);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 12px 7px 32px;font-size:12px;width:220px;outline:none;transition:border-color .15s,box-shadow .15s;font-family:var(--font)}
.search-wrap input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,86,219,.08)}
.search-wrap input::placeholder{color:var(--text-light)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-light);pointer-events:none;font-size:13px}
.bases-info{font-size:11px;color:var(--text-muted);padding:0 4px}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 24px 32px;min-width:0}

/* TABLE */
.table-container{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:auto;width:100%}
table{border-collapse:collapse;font-size:11.5px;min-width:1300px;width:max-content}
thead th{background:#F8FAFC;color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:5}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#F8FAFC}
td{padding:8px 10px;vertical-align:middle;white-space:nowrap}

/* BADGES */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid}
.status-badge.green{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.status-badge.yellow{background:var(--yellow-bg);color:#92400E;border-color:var(--yellow-border)}
.status-badge.red{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.status-badge.gray{background:var(--gray-bg);color:var(--paid);border-color:var(--gray-border)}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-dot.green{background:#059669}.status-dot.yellow{background:#D97706}.status-dot.red{background:#DC2626}.status-dot.gray{background:#9CA3AF}
.doc-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.4px}
.doc-badge.DUP{background:#EEF2FF;color:#3730A3}.doc-badge.PED{background:#FFF7ED;color:#C2410C}.doc-badge.ASSIST{background:#F0FDF4;color:#166534}
.base-chip{display:inline-block;background:var(--gray-bg);color:var(--text-muted);font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px}
.atraso-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.atraso-badge.red{background:var(--red-bg);color:#DC2626}.atraso-badge.none{color:var(--text-light)}
.valor{font-variant-numeric:tabular-nums;font-weight:600;font-size:12px}
.valor.aberto{color:#B45309}.val-zero{color:var(--text-light)}
.client-name{font-weight:600;color:var(--text);max-width:160px;overflow:hidden;text-overflow:ellipsis;display:block}.rep-name{font-size:11px;color:var(--text-muted);margin-top:1px;max-width:140px;overflow:hidden;text-overflow:ellipsis;display:block}

/* PARECER */
.parecer-cell{min-width:220px;max-width:320px;white-space:normal!important}
.parecer-readonly{font-size:12px;color:var(--text-muted);line-height:1.45;white-space:normal;max-width:300px}
.parecer-none{color:var(--text-light);font-style:italic;font-size:12px}
.parecer-wrap{display:flex;align-items:center;gap:6px}
.parecer-input{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 10px;font-size:12px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s;font-family:var(--font)}
.parecer-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,86,219,.08)}
.parecer-input::placeholder{color:var(--text-light)}
.save-btn{background:var(--primary);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s;font-family:var(--font)}
.save-btn:hover{background:var(--primary-hover)}
.edit-btn{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer;flex-shrink:0;transition:all .12s;font-family:var(--font)}
.edit-btn:hover{border-color:var(--primary);color:var(--primary)}
.hist-btn{background:none;border:none;color:var(--primary);cursor:pointer;font-size:11px;font-weight:600;padding:3px 6px;border-radius:4px;transition:background .12s;white-space:nowrap;font-family:var(--font)}
.hist-btn:hover{background:var(--primary-light)}

/* EMPTY */
.empty-state{text-align:center;padding:80px 24px;color:var(--text-muted)}
.empty-icon{width:64px;height:64px;background:var(--primary-light);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px}
.empty-state h2{font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-state p{font-size:13px;line-height:1.6;color:var(--text-muted)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#1E293B;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .2s;z-index:999;pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success::before{content:"✓";color:#34D399;font-weight:700}
.toast.error::before{content:"✕";color:#F87171;font-weight:700}
.toast.info::before{content:"↻";color:#60A5FA;font-weight:700}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,24,40,.45);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border:1px solid var(--border);border-radius:12px;width:520px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 40px rgba(0,0,0,.15);overflow:hidden}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:15px;font-weight:700}
.modal-client{font-size:12px;color:var(--text-muted);margin-top:2px}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .12s;line-height:1}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:16px 20px;overflow-y:auto}
.hist-empty{color:var(--text-muted);font-size:13px;text-align:center;padding:20px}
.hist-item{display:flex;gap:12px;margin-bottom:12px}
.hist-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.hist-dot{width:10px;height:10px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:3px}
.hist-connector{width:1px;flex:1;background:var(--border);min-height:16px;margin-top:4px}
.hist-content{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:4px}
.hist-date{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:2px}
.hist-base{font-size:10px;color:var(--text-light);margin-bottom:4px}
.hist-text{font-size:12.5px;color:var(--text);line-height:1.45}

/* PAID TABLE */
.paid-info{font-size:11px;color:var(--text-muted);margin-top:2px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#A0AEC0}
.no-results td{text-align:center;padding:40px;color:var(--text-muted);font-size:13px}

/* MULTISELECT */
.ms-wrap{position:relative;display:inline-block}
.ms-trigger{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:5px 28px 5px 10px;font-size:12px;color:var(--text);cursor:pointer;white-space:nowrap;min-width:140px;text-align:left;font-family:var(--font);transition:border-color .15s;position:relative}
.ms-trigger:hover{border-color:var(--primary)}
.ms-trigger.active-filter{border-color:var(--primary);background:var(--primary-light);color:var(--primary);font-weight:600}
.ms-trigger::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text-muted)}
.ms-dropdown{position:absolute;top:calc(100% + 4px);left:0;min-width:220px;max-width:320px;background:var(--white);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);z-index:500;display:none;flex-direction:column;max-height:260px;overflow:hidden}
.ms-dropdown.open{display:flex}
.ms-search{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.ms-search input{width:100%;border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-size:12px;outline:none;font-family:var(--font);color:var(--text)}
.ms-search input:focus{border-color:var(--primary)}
.ms-list{overflow-y:auto;flex:1}
.ms-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:12px;transition:background .1s}
.ms-item:hover{background:var(--bg)}
.ms-item input[type=checkbox]{accent-color:var(--primary);width:14px;height:14px;flex-shrink:0}
.ms-item label{cursor:pointer;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-footer{padding:6px 10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-shrink:0}
.ms-clear{background:none;border:none;font-size:11px;color:var(--text-muted);cursor:pointer;font-family:var(--font)}
.ms-clear:hover{color:var(--red)}
.ms-count{font-size:11px;color:var(--primary);font-weight:600}

/* RECORRENCIA */
.recorr-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;margin-right:4px;flex-shrink:0}
.recorr-badge.low{background:#FEF3C7;color:#92400E}
.recorr-badge.mid{background:#FEE2E2;color:#991B1B}
.recorr-badge.high{background:#991B1B;color:#fff}
</style>
</head>

<script>
// ══════════════════════════════════════════════════════
// CONFIG — cole a URL do Apps Script após deploy
// ══════════════════════════════════════════════════════
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz-udeazasqYXZ6yn9vCpywkn59ePqKLKciCllUL_IKbTkWq8giUieEO21DCUWwn024/exec';

// ══════════════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════════════
let S = {
  tab: 'hoje',
  docFilter: 'TODOS',
  statusFilter: 'TODOS',
  periodFilter: 3,
  search: '',
  clientFilter: [],
  repFilter: [],
  allImports: [],
  pareceres: {},
  sortCol: '',
  sortDir: 1,
};

// ══════════════════════════════════════════════════════
// PERSISTÊNCIA LOCAL
// ══════════════════════════════════════════════════════
function saveLocal() {
  try {
    const imps = S.allImports.map(imp => ({
      ...imp,
      rows: imp.rows.map(r => ({...r, _vcto: undefined}))
    }));
    localStorage.setItem('cb_v2_imports', JSON.stringify(imps));
    localStorage.setItem('cb_v2_pareceres', JSON.stringify(S.pareceres));
  } catch(e) { console.warn('localStorage:', e); }
}

function loadLocal() {
  try {
    const imp = localStorage.getItem('cb_v2_imports');
    if (imp) {
      S.allImports = JSON.parse(imp);
      S.allImports.forEach(imp => imp.rows.forEach(rebuildDate));
    }
    const par = localStorage.getItem('cb_v2_pareceres');
    if (par) S.pareceres = JSON.parse(par);
  } catch(e) { console.warn('loadLocal:', e); }
}

function rebuildDate(row) {
  if (row._vctoStr) {
    const [d,m,y] = row._vctoStr.split('/');
    row._vcto = (d && m && y) ? new Date(+y, +m-1, +d) : null;
  }
}

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
function rowKey(r) { return [r.emp,r.doc,r.titulo,r.parc].join('|'); }

function excelToDate(serial) {
  if (!serial || isNaN(serial)) return null;
  // Converte serial do Excel para data sem problemas de fuso
  const days = Math.floor(serial - 25569);
  const d = new Date(days * 86400000);
  // Extrai dia/mês/ano em UTC para evitar fuso horário
  const day   = String(d.getUTCDate()).padStart(2,'0');
  const month = String(d.getUTCMonth()+1).padStart(2,'0');
  const year  = d.getUTCFullYear();
  return day + '/' + month + '/' + year;
}

function fmtDate(d) {
  if (!d) return '—';
  if (typeof d === 'string') return d;
  return d.toLocaleDateString('pt-BR');
}

function fmtMoney(v) {
  if (!v && v !== 0) return '—';
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function todayStr() { return today().toLocaleDateString('pt-BR'); }
function daysAgo(n) { const d = today(); d.setDate(d.getDate()-n); return d; }

function parseBR(str) {
  const [d,m,y] = String(str||'').split('/');
  return (d&&m&&y) ? new Date(+y,+m-1,+d) : null;
}

function extractDateFromFilename(name) {
  const m = name.match(/[Cc]obra[nçn][aec][a-z]*[_.]([0-9]{1,2})[_.]([0-9]{1,2})/i);
  if (!m) return null;
  const year = new Date().getFullYear();
  return m[1].padStart(2,'0') + '/' + m[2].padStart(2,'0') + '/' + year;
}

function getStatus(row) {
  if (row._paid) return 'gray';
  const vcto = row._vcto;
  if (!vcto) return 'green';
  const diff = Math.floor((vcto - today()) / 86400000);
  if (diff < 0) return 'red';
  if (diff <= 7) return 'yellow';
  return 'green';
}

function statusLabel(st) {
  return {green:'Em dia',yellow:'≤ 7 dias',red:'Vencido',gray:'Pago'}[st]||'—';
}

function latestKeys() {
  if (!S.allImports.length) return new Set();
  const sorted = [...S.allImports].sort((a,b) => (parseBR(b.baseDate)||0) - (parseBR(a.baseDate)||0));
  return new Set(sorted[0].rows.map(rowKey));
}

function markPaid() {
  const latest = latestKeys();
  S.allImports.forEach(imp => {
    imp.rows.forEach(row => { row._paid = !latest.has(rowKey(row)); });
  });
}

function todayRows() {
  if (!S.allImports.length) return [];
  const sorted = [...S.allImports].sort((a,b) => (parseBR(b.baseDate)||0) - (parseBR(a.baseDate)||0));
  return sorted[0].rows.filter(r => !r._paid);
}

function geralRows(days) {
  const cutoff = daysAgo(days);
  const seen = new Map();
  [...S.allImports]
    .filter(imp => (parseBR(imp.baseDate)||0) >= cutoff)
    .sort((a,b) => (parseBR(a.baseDate)||0) - (parseBR(b.baseDate)||0))
    .forEach(imp => imp.rows.forEach(r => seen.set(rowKey(r), {...r})));
  return [...seen.values()];
}

function pagosRows(days) {
  const cutoff = daysAgo(days);
  const seen = new Map();
  [...S.allImports]
    .filter(imp => (parseBR(imp.baseDate)||0) >= cutoff)
    .forEach(imp => imp.rows.forEach(r => {
      if (r._paid) seen.set(rowKey(r), {...r});
    }));
  return [...seen.values()];
}

// ══════════════════════════════════════════════════════
// IMPORT EXCEL
// ══════════════════════════════════════════════════════

// Normaliza qualquer formato de data para DD/MM/YYYY
function normDate(raw) {
  if (!raw) return '';
  const s = String(raw).trim();
  if (s.match(/^\d{2}\/\d{2}\/\d{4}$/)) return s;
  const d = new Date(s);
  if (!isNaN(d)) {
    return String(d.getDate()).padStart(2,'0') + '/' +
           String(d.getMonth()+1).padStart(2,'0') + '/' +
           d.getFullYear();
  }
  return '';
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const baseDate = extractDateFromFilename(file.name);
  if (!baseDate) {
    showToast('Nome fora do padrão. Use: Cobrança_DD_MM.xlsx', 'error');
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      parseAndSave(raw, file.name, baseDate);
    } catch(err) { showToast('Erro: ' + err.message, 'error'); }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

function parseAndSave(raw, filename, baseDate) {
  if (raw.length < 2) { showToast('Planilha vazia.', 'error'); return; }

  // detecta cabeçalho
  let hi = 0;
  for (let i = 0; i < Math.min(10, raw.length); i++) {
    const r = raw[i].map(c => String(c).toLowerCase());
    if (r.some(c => c.includes('doc') || c.includes('titulo') || c.includes('título'))) { hi=i; break; }
  }

  const headers = raw[hi].map(c =>
    String(c).trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
  );

  const col = (...terms) => {
    for (const t of terms) {
      const idx = headers.findIndex(h => h.includes(t));
      if (idx !== -1) return idx;
    }
    return -1;
  };

  const iEmp=col('emp'), iDoc=col('doc'), iTit=col('titulo'), iParc=col('parc');
  const iCli=col('cliente');
  const iVcto=col('vencimento'), iAtraso=col('atraso');
  const iVlrTit=col('vlr tit','vlr_tit'), iVlrPago=col('vlr pago','vlr_pago'), iVlrAb=col('vlr aberto','vlr_ab');
  const iCidade=col('cidade'), iUF=col('uf');
  const iEmis=col('emissao','emissão'), iProrr=col('prorrog'), iVctoOrig=col('vcto. orig','vcto orig');
  const iVlrCor=col('vlr corr'), iDescEsp=col('desconto esp'), iVlrDesc=col('vlr. desconto','vlr desconto');
  const iVlrMult=col('multa'), iDesp=col('cartorio','cartório'), iJuros=col('juros');
  const iOutras=col('outras desp'), iPctCom=col('% comiss'), iBaseCom=col('base comiss');
  const iDtUlt=col('dt.ult','dt ult'), iNota=col('nota'), iMoeda=col('moeda');
  const iPortador=col('portador'), iDesc=col('descri'), iNumBanco=col('numero banco','numero_banco');
  const iRemessa=col('remessa'), iDataBanco=col('data banco'), iIRPJ=col('irpj'), iPIS=col('pis');
  const iCOFINS=col('cofins'), iCSSL=col('csll'), iISSQN=col('issqn');
  const iVarA=col('cambial ativa'), iVarP=col('cambial pass');
  const iVlrNeg=col('negociado'), iVlrDisp=col('disponivel','disponível');
  const iNF=col('notas fiscais','nf origem'), iSit=col('situac'), iCodBar=col('barras');
  const iRepCod=col('rep.');

  // 1ª e 2ª ocorrência de "nome"
  let iNome1=-1, iNome2=-1;
  for (let i=0; i<headers.length; i++) {
    if (headers[i].trim()==='nome') {
      if (iNome1===-1) iNome1=i;
      else if (iNome2===-1) { iNome2=i; break; }
    }
  }

  const newRows = [];
  const rawRowsForSheets = [];

  for (let i=hi+1; i<raw.length; i++) {
    const r = raw[i];
    if (!r||r.every(c=>c===''||c===null||c===undefined)) continue;
    const doc = String(r[iDoc]??''). trim().toUpperCase();
    if (!doc) continue;
    const vlrAb = parseFloat(String(r[iVlrAb]??0).replace(',','.'))||0;
    if (vlrAb<=0) continue;

    const vctoDateStr = excelToDate(r[iVcto]); // retorna DD/MM/YYYY
    const emisDate = excelToDate(r[iEmis]);
    // Converte string DD/MM/YYYY → Date para getStatus funcionar
    let vctoDate = null;
    if (vctoDateStr && vctoDateStr !== '—') {
      const [dv,mv,yv] = vctoDateStr.split('/');
      if (dv && mv && yv) vctoDate = new Date(+yv, +mv-1, +dv);
    }

    const row = {
      emp:       String(r[iEmp]??''). trim(),
      doc,
      titulo:    String(r[iTit]??''). trim(),
      parc:      String(r[iParc]??''). trim(),
      codCli:    iCli!==-1 ? String(r[iCli]??''). trim() : '',
      cliente:   iNome1!==-1 ? String(r[iNome1]??''). trim() : '',
      rep:       iNome2!==-1 ? String(r[iNome2]??''). trim() : '',
      _vcto:     vctoDate,
      _vctoStr:  vctoDateStr || '—',
      atraso:    parseInt(r[iAtraso])||0,
      vlrTit:    parseFloat(String(r[iVlrTit]??0).replace(',','.'))||0,
      vlrPago:   parseFloat(String(r[iVlrPago]??0).replace(',','.'))||0,
      vlrAberto: vlrAb,
      _paid:     false,
      _baseDate: baseDate,
      _importDate: todayStr(),
    };
    newRows.push(row);

    // Objeto completo para salvar no Sheets (Listas)
    rawRowsForSheets.push({
      emp: row.emp, doc: row.doc, titulo: row.titulo, parc: row.parc,
      cliente: String(r[iNome1]??''). trim(),
      nomeCliente: String(r[iNome1]??''). trim(),
      cidade: iCidade!==-1?String(r[iCidade]??''). trim():'',
      uf: iUF!==-1?String(r[iUF]??''). trim():'',
      repCod: iRepCod!==-1?String(r[iRepCod]??''). trim():'',
      rep: row.rep,
      emissao: fmtDate(emisDate),
      vcto: row._vctoStr,
      atraso: row.atraso,
      prorrogacao: iProrr!==-1?r[iProrr]:0,
      vctoOrig: iVctoOrig!==-1?fmtDate(excelToDate(r[iVctoOrig])):'',
      vlrTit: row.vlrTit, vlrPago: row.vlrPago, vlrAberto: row.vlrAberto,
      vlrCorrigido: iVlrCor!==-1?r[iVlrCor]:0,
      descontoEsp: iDescEsp!==-1?r[iDescEsp]:0,
      vlrDesconto: iVlrDesc!==-1?r[iVlrDesc]:0,
      vlrMulta: iVlrMult!==-1?r[iVlrMult]:0,
      despCartorio: iDesp!==-1?r[iDesp]:0,
      valJuros: iJuros!==-1?r[iJuros]:0,
      outrasDespesas: iOutras!==-1?r[iOutras]:0,
      pctComissao: iPctCom!==-1?r[iPctCom]:0,
      baseComissao: iBaseCom!==-1?r[iBaseCom]:0,
      dtUltMov: iDtUlt!==-1?fmtDate(excelToDate(r[iDtUlt])):'',
      nota: iNota!==-1?String(r[iNota]??''). trim():'',
      moeda: iMoeda!==-1?String(r[iMoeda]??''). trim():'',
      portador: iPortador!==-1?String(r[iPortador]??''). trim():'',
      descricao: iDesc!==-1?String(r[iDesc]??''). trim():'',
      numBanco: iNumBanco!==-1?r[iNumBanco]:'',
      remessa: iRemessa!==-1?r[iRemessa]:'',
      dataBanco: iDataBanco!==-1?fmtDate(excelToDate(r[iDataBanco])):'',
      vlrIRPJ: iIRPJ!==-1?r[iIRPJ]:0, vlrPIS: iPIS!==-1?r[iPIS]:0,
      vlrCOFINS: iCOFINS!==-1?r[iCOFINS]:0, vlrCSSL: iCSSL!==-1?r[iCSSL]:0,
      vlrISSQN: iISSQN!==-1?r[iISSQN]:0,
      varCambialA: iVarA!==-1?r[iVarA]:0, varCambialP: iVarP!==-1?r[iVarP]:0,
      vlrNegociado: iVlrNeg!==-1?r[iVlrNeg]:0,
      vlrDisponivel: iVlrDisp!==-1?r[iVlrDisp]:0,
      nfOrigem: iNF!==-1?String(r[iNF]??''). trim():'',
      situacao: iSit!==-1?String(r[iSit]??''). trim():'',
      codBarras: iCodBar!==-1?String(r[iCodBar]??''). trim():'',
    });
  }

  if (!newRows.length) { showToast('Nenhum título com saldo em aberto.', 'error'); return; }

  // Remove base anterior com mesma data e adiciona nova
  S.allImports = S.allImports.filter(imp => imp.baseDate !== baseDate);
  S.allImports.push({ baseDate, importDate: todayStr(), rows: newRows });
  S.allImports = S.allImports.slice(-30);

  markPaid();

  // Atualiza header imediatamente
  document.getElementById('headerSub').textContent =
    filename + ' · Importado em ' + todayStr() + ' · ' + newRows.length + ' títulos';
  document.getElementById('baseDateText').textContent = baseDate;
  document.getElementById('baseBadge').style.display = 'flex';

  // Renderiza já com dados locais enquanto busca do Sheets
  renderAll();
  showToast('Carregando ' + newRows.length + ' títulos... buscando pareceres', 'info');

  if (WEB_APP_URL) {
    // Salva lista e busca pareceres em paralelo
    Promise.all([
      // Salva lista completa no Sheets
      fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'saveLista', baseDate, rows: rawRowsForSheets })
      }).catch(e => console.warn('saveLista:', e)),

      // Busca pareceres existentes no Sheets
      fetch(WEB_APP_URL + '?action=getPareceres')
        .then(r => r.json())
        .catch(e => { console.warn('getPareceres:', e); return {pareceres:[]}; })
    ]).then(function(results) {
      const resPareceres = results[1];

      if (resPareceres.pareceres && resPareceres.pareceres.length) {
        resPareceres.pareceres.forEach(function(p) {
          if (!p.parecer) return;
          const k = p.key;
          if (!S.pareceres[k]) S.pareceres[k] = [];

          // Normaliza datas vindas do Sheets
          const bd = normDate(p.baseDate);
          const dt = normDate(p.data) || bd;

          // Deduplicação por baseDate — 1 parecer por base por título
          const existe = S.pareceres[k].some(h => h.baseDate === bd);
          if (!existe && bd) {
            S.pareceres[k].push({ texto: p.parecer, data: dt, baseDate: bd });
          }
        });
      }

      saveLocal();
      renderAll();
      showToast(newRows.length + ' títulos carregados · Base: ' + baseDate, 'success');
    });
  } else {
    saveLocal();
    showToast(newRows.length + ' títulos carregados · Base: ' + baseDate, 'success');
  }
}

// ══════════════════════════════════════════════════════
// SYNC DO SHEETS
// ══════════════════════════════════════════════════════
async function fetchParecerFromSheets(key, baseDate) {
  // Busca pareceres existentes no Sheets para um título específico
  if (!WEB_APP_URL) return;
  try {
    const url = WEB_APP_URL + '?action=getPareceres&key=' + encodeURIComponent(key) + '&baseDate=' + encodeURIComponent(baseDate);
    const res = await fetch(url).then(r => r.json());
    if (res.pareceres && res.pareceres.length) {
      res.pareceres.forEach(function(p) {
        if (!p.parecer) return;
        const k = p.key;
        if (!S.pareceres[k]) S.pareceres[k] = [];
        const bd = normDate(p.baseDate);
        const dr = normDate(p.data) || bd;
        if (!S.pareceres[k].some(h => h.baseDate === bd)) {
          S.pareceres[k].push({ texto: p.parecer, data: dr, baseDate: bd });
        }
      });
    }
  } catch(e) { console.warn('fetchPareceres:', e); }
}

async function loadAllPareceres() {
  // Busca todos os pareceres do Sheets ao importar uma base
  if (!WEB_APP_URL) return;
  try {
    const res = await fetch(WEB_APP_URL + '?action=getPareceres').then(r => r.json());
    if (res.pareceres && res.pareceres.length) {
      res.pareceres.forEach(function(p) {
        if (!p.parecer) return;
        const k = p.key;
        if (!S.pareceres[k]) S.pareceres[k] = [];
        const bd = normDate(p.baseDate);
        const dr = normDate(p.data) || bd;
        // Deduplicação: mesma chave + mesma baseDate = atualiza, não duplica
        const idx = S.pareceres[k].findIndex(h => h.baseDate === bd);
        if (idx !== -1) {
          S.pareceres[k][idx] = { texto: p.parecer, data: dr, baseDate: bd };
        } else {
          S.pareceres[k].push({ texto: p.parecer, data: dr, baseDate: bd });
        }
      });
      saveLocal();
    }
  } catch(e) { console.warn('loadAllPareceres:', e); }
}

  updateSummary();

function currentRows() {
  if (S.tab==='hoje')  return todayRows();
  if (S.tab==='geral') return geralRows(S.periodFilter);
  if (S.tab==='pagos') return pagosRows(S.periodFilter);
  return [];
}

function updateSummary() {
  const sa = document.getElementById('summaryArea');
  const rows = currentRows();
  if (!rows.length && !S.allImports.length) { sa.innerHTML=''; return; }

  let total=0,cRed=0,vRed=0,cYel=0,vYel=0,cGreen=0,cPaid=0,vPaid=0,comParecer=0;
  rows.forEach(row => {
    const st=getStatus(row), k=rowKey(row);
    if (st==='red')    { cRed++;   vRed   +=row.vlrAberto; total+=row.vlrAberto; }
    if (st==='yellow') { cYel++;   vYel   +=row.vlrAberto; total+=row.vlrAberto; }
    if (st==='green')  { cGreen++;                          total+=row.vlrAberto; }
    if (st==='gray')   { cPaid++;  vPaid  +=row.vlrAberto; }
    if ((S.pareceres[k]||[]).length) comParecer++;
  });

  if (S.tab==='hoje') {
    sa.innerHTML = card('blue','💰','Total em Aberto',fmtMoney(total),rows.length+' títulos') +
      card('red','⚠️','Vencidos',cRed,fmtMoney(vRed),'c-red') +
      card('yellow','🕐','Vencem em 7 dias',cYel,fmtMoney(vYel),'c-yellow') +
      card('green','📝','Com Parecer',comParecer,rows.length-comParecer+' pendentes','c-green');
  } else if (S.tab==='geral') {
    sa.innerHTML = card('blue','📊','Total em Aberto',fmtMoney(total),(cRed+cYel+cGreen)+' ativos') +
      card('red','⚠️','Vencidos',cRed,fmtMoney(vRed),'c-red') +
      card('green','✓','Pagos no Período',cPaid,fmtMoney(vPaid),'c-green') +
      card('gray','📝','Com Parecer',comParecer,(cRed+cYel+cGreen)-comParecer+' pendentes','c-gray');
  } else {
    sa.innerHTML = card('gray','✓','Títulos Pagos',rows.length,fmtMoney(vPaid),'c-gray') +
      card('green','📝','Com Parecer',comParecer,rows.length-comParecer+' sem parecer','c-green') +
      card('blue','💰','Valor Total',fmtMoney(vPaid),'') +
      card('yellow','📅','Bases no Período',S.allImports.length,'importações','c-yellow');
  }
}

}

function renderTable() {
  const hasData = S.allImports.length > 0;
  document.getElementById('emptyState').style.display = hasData?'none':'';
  document.getElementById('tableContainer').style.display = hasData?'':' none';
  if (!hasData) return;

  const rows = currentRows();
  const filtered = rows.filter(row => {
    if (S.docFilter!=='TODOS' && row.doc!==S.docFilter) return false;
    if (S.statusFilter!=='TODOS' && getStatus(row)!==S.statusFilter) return false;
    if (S.clientFilter.length && !S.clientFilter.includes(row.cliente)) return false;
    if (S.repFilter.length && !S.repFilter.includes(row.rep)) return false;
    if (S.search) {
      if (!(row.cliente+row.rep+row.titulo).toLowerCase().includes(S.search.toLowerCase())) return false;
    }
    return true;
  });

  // Badges
  // Ordenação
  if (S.sortCol) {
    filtered.sort(function(a,b) {
      let va, vb;
      if (S.sortCol === 'vcto')    { va = a._vcto||new Date(9999,0,1); vb = b._vcto||new Date(9999,0,1); return (va-vb)*S.sortDir; }
      if (S.sortCol === 'atraso')  { va = a.atraso||0; vb = b.atraso||0; return (va-vb)*S.sortDir; }
      if (S.sortCol === 'aberto')  { va = a.vlrAberto||0; vb = b.vlrAberto||0; return (va-vb)*S.sortDir; }
      if (S.sortCol === 'parecer') {
        const ha = (S.pareceres[rowKey(a)]||[]).length > 0;
        const hb = (S.pareceres[rowKey(b)]||[]).length > 0;
        return (ha===hb?0:ha?-1:1)*S.sortDir;
      }
      return 0;
    });
  }

  document.getElementById('badgeHoje').textContent = todayRows().length;
  document.getElementById('badgeGeral').textContent = geralRows(S.periodFilter).length;
  document.getElementById('badgePagos').textContent = pagosRows(S.periodFilter).length;

  const isHoje = S.tab==='hoje';

  // thead
  const sa = function(col) {
    if (S.sortCol!==col) return ' <span style="color:#CBD3E0;font-size:9px">&#8645;</span>';

    const reincHtml = reincN > 0 ? recorrBadge(reincN) : '<span style="color:var(--text-light);font-size:11px">—</span>';

    if (isPagos) {
      return `<tr>
        <td>${stBadge}</td>
        <td>${docBadge}</td>
        <td style="color:var(--text-muted)">${esc(row.titulo)} / ${esc(row.parc)}</td>
        <td style="color:var(--text-muted);font-size:11px">${esc(row.codCli||'—')}</td>
        <td><div class="client-name">${esc(row.cliente)}</div></td>
        <td><div class="rep-name">${esc(row.rep)}</div></td>
        <td style="${vctoColor};font-weight:500">${row._vctoStr||'—'}</td>
        <td class="valor">${fmtMoney(row.vlrTit)}</td>
        <td class="parecer-cell">${parecerHtml}</td>
        <td>${histHtml}</td>
      </tr>`;
    }

    return `<tr>
      <td>${stBadge}</td>
      <td>${docBadge}</td>
      <td style="color:var(--text-muted)">${esc(row.titulo)} / ${esc(row.parc)}</td>
      <td style="color:var(--text-muted);font-size:11px">${esc(row.codCli||'—')}</td>
      <td><div class="client-name">${esc(row.cliente)}</div></td>
      <td><div class="rep-name">${esc(row.rep)}</div></td>
      <td style="${vctoColor};font-weight:500">${row._vctoStr||'—'}</td>
      <td>${atrasoHtml}</td>
      <td class="valor">${fmtMoney(row.vlrTit)}</td>
      <td>${vlrPagoHtml}</td>
      <td class="valor aberto">${fmtMoney(row.vlrAberto)}</td>
      <td>${reincHtml}</td>
      <td class="parecer-cell">${parecerHtml}</td>
      <td>${histHtml}</td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
// PARECER
// ══════════════════════════════════════════════════════
function saveParecer(idx) {
  const row = window._filteredRows[idx];
  const input = document.getElementById('inp_'+idx);
  if (!input) return;
  const texto = input.value.trim();
  if (!texto) { showToast('Digite um parecer antes de salvar.', 'error'); return; }

  const k = rowKey(row);
  const bd = row._baseDate || '—';
  const td = todayStr();
  if (!S.pareceres[k]) S.pareceres[k] = [];

  // Uma entrada por baseDate — atualiza se já existe
  const ei = S.pareceres[k].findIndex(function(h) { return h.baseDate === bd; });
  const reg = { texto: texto, data: td, baseDate: bd };
  if (ei !== -1) S.pareceres[k][ei] = reg;
  else S.pareceres[k].push(reg);

  saveLocal();

  if (WEB_APP_URL) {
    fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'saveParecer',
        data: {
          emp: row.emp, doc: row.doc, titulo: row.titulo, parc: row.parc,
          cliente: row.cliente, nomeCliente: row.cliente, rep: row.rep,
          emissao: '', vcto: row._vctoStr||'—', atraso: row.atraso,
          vlrTit: row.vlrTit, vlrPago: row.vlrPago, vlrAberto: row.vlrAberto,
          parecer: texto, baseDate: bd, data: td,
          key: k
        }
      })
    }).catch(function() {});
  }

  showToast('Parecer salvo!', 'success');
  renderAll();
}


function editParecer(idx) {
  const row = window._filteredRows[idx];
  const k = rowKey(row);
  const bd = row._baseDate || '—';
  if (S.pareceres[k]) {
    const ei = S.pareceres[k].findIndex(h => h.baseDate === bd);
    if (ei !== -1) S.pareceres[k].splice(ei, 1);
  }
  renderAll();
  setTimeout(() => {
    const inp = document.getElementById('inp_' + idx);
    if (inp) inp.focus();
  }, 60);
}

function openHistorico(k) {
  const hist = S.pareceres[k]||[];
  const row = geralRows(30).find(r=>rowKey(r)===k);
  document.getElementById('modalTitle').textContent = 'Histórico de Pareceres';
  document.getElementById('modalClient').textContent =
    row ? row.cliente+' · '+row.doc+' '+row.titulo+'/'+row.parc : k;
  const body = document.getElementById('modalBody');
  if (!hist.length) {
    body.innerHTML='<div class="hist-empty">Nenhum parecer registrado.</div>';
  } else {
    body.innerHTML=[...hist].reverse().map((h,i,arr)=>`
      <div class="hist-item">
        <div class="hist-line">
          <div class="hist-dot"></div>
          ${i<arr.length-1?'<div class="hist-connector"></div>':''}</div>
        <div class="hist-content">
          <div class="hist-date">Registrado em ${h.data}</div>
          <div class="hist-base">Base: ${h.baseDate||'—'}</div>
          <div class="hist-text">${esc(h.texto)}</div>
        </div>
      </div>`).join('');
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function toggleSort(col) {
  if (S.sortCol === col) S.sortDir *= -1;
  else { S.sortCol = col; S.sortDir = 1; }
  renderTable();
}

// ── MULTISELECT ──────────────────────────────────────────────────
function toggleMs(id) {
  document.querySelectorAll('.ms-dropdown').forEach(d => {
    if (d.id !== id) d.classList.remove('open');
  });
  const dd = document.getElementById(id);
  if (dd) dd.classList.toggle('open');
}

function filterMsList(inputId, listId) {
  const q = document.getElementById(inputId).value.toLowerCase();
  document.querySelectorAll('#' + listId + ' .ms-item').forEach(item => {
    item.style.display = item.dataset.val.toLowerCase().includes(q) ? '' : 'none';
  });
}

function toggleMsItem(type, val) {
  const arr = type === 'client' ? S.clientFilter : S.repFilter;
  const idx = arr.indexOf(val);
  if (idx === -1) arr.push(val);
  else arr.splice(idx, 1);
  updateMsTrigger(type);
  renderTable();
}

function clearMs(type) {
  if (type === 'client') S.clientFilter = [];
  else S.repFilter = [];
  updateMsTrigger(type);
  const listId = type === 'client' ? 'msClientList' : 'msRepList';
  document.querySelectorAll('#' + listId + ' input[type=checkbox]').forEach(cb => cb.checked = false);
  renderTable();
}

function updateMsTrigger(type) {
  const arr = type === 'client' ? S.clientFilter : S.repFilter;
  const btn = document.getElementById(type === 'client' ? 'msBtnClient' : 'msBtnRep');
  const label = type === 'client' ? 'Cliente' : 'Representante';
  if (!btn) return;
  if (arr.length === 0) {
    btn.textContent = label;
    btn.classList.remove('active-filter');
  } else if (arr.length === 1) {
    btn.textContent = arr[0].length > 18 ? arr[0].slice(0,18)+'…' : arr[0];
    btn.classList.add('active-filter');
  } else {
    btn.textContent = label + ' (' + arr.length + ')';
    btn.classList.add('active-filter');
  }
}

function buildMsDropdown(type, items) {
  const id     = type === 'client' ? 'msClient' : 'msRep';
  const listId = id + 'List';
  const inpId  = id + 'Search';
  const arr    = type === 'client' ? S.clientFilter : S.repFilter;
  const label  = type === 'client' ? 'Cliente' : 'Representante';
  const btnId  = type === 'client' ? 'msBtnClient' : 'msBtnRep';
  const ddId   = type === 'client' ? 'msClientDd' : 'msRepDd';

  const itemsHtml = [...new Set(items)].sort().map(function(v) {
    const checked = arr.includes(v) ? 'checked' : '';
    const vs = esc(v);
    const vj = v.replace(/'/g, "\\'");
    return '<div class="ms-item" data-val="' + vs + '">' +
      '<input type="checkbox" ' + checked + ' onchange="toggleMsItem(\''+type+'\',\''+vj+'\')">'+
      '<label onclick="toggleMsItem(\''+type+'\',\''+vj+'\')">'+vs+'</label>'+
      '</div>';
  }).join('');

  const triggerLabel = arr.length === 0 ? label : arr.length === 1 ? esc(arr[0]) : label + ' (' + arr.length + ')';
  const activeCls = arr.length ? ' active-filter' : '';

  return '<div class="ms-wrap">' +
    '<button class="ms-trigger' + activeCls + '" id="' + btnId + '" onclick="toggleMs(\''+ddId+'\')">'+triggerLabel+'</button>' +
    '<div class="ms-dropdown" id="' + ddId + '">' +
      '<div class="ms-search"><input id="' + inpId + '" type="text" placeholder="Buscar ' + label.toLowerCase() + '..." oninput="filterMsList(\''+inpId+'\',\''+listId+'\')"></div>' +
      '<div class="ms-list" id="' + listId + '">' + itemsHtml + '</div>' +
      '<div class="ms-footer">' +
        '<button class="ms-clear" onclick="clearMs(\''+type+'\')">Limpar</button>' +
        '<span class="ms-count">' + arr.length + ' selecionado' + (arr.length !== 1 ? 's' : '') + '</span>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// Fecha dropdowns ao clicar fora
document.addEventListener('click', e => {
  if (!e.target.closest('.ms-wrap')) {
    document.querySelectorAll('.ms-dropdown').forEach(d => d.classList.remove('open'));
  }
});

// ── RECORRÊNCIA ──────────────────────────────────────────────────
function getRecorrencia(key) {
  // Conta em quantas bases esse título apareceu (vencido)
  // Começa em 1x na base atual se estiver vencido
  let count = 0;
  S.allImports.forEach(function(imp) {
    const row = imp.rows.find(function(r) { return rowKey(r) === key; });
    if (row && !row._paid) count++;
  });
  return count;
}

function recorrBadge(n) {
  if (n <= 0) return '';
  const cls = n >= 5 ? 'high' : n >= 3 ? 'mid' : 'low';
  return '<span class="recorr-badge ' + cls + '" title="' + n + ' bases">' + n + 'x</span>';
}

function switchTab(tab) {
  S.tab=tab; S.statusFilter='TODOS';
  ['hoje','geral','pagos'].forEach(t =>
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active',t===tab)
  );
  renderAll();
}

let _tt;
function showToast(msg, type='success') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+type;
  clearTimeout(_tt); _tt=setTimeout(()=>{t.className='toast';},3500);
}
